<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Libreria FETCH</title>
  </head>
  <body>
    <div id="nombre"></div>

    <script>
      let datosJson;
      // una promesa es una declaracion que se resuelve en el futuro
      // parsear es convertir el archivo json en un objeto
      fetch("persona.json")
        .then((res) => res.json())
        .then((salida) => {
          datosJson = salida;

          let elementoTexto = document.getElementById("nombre");
          elementoTexto.textContent = datosJson.nombre;
        });
    </script>
  </body>
</html>
