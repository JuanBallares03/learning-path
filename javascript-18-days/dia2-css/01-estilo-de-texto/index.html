<html lang="en">
  <head>
    <title>Estilo de texto</title>
  </head>
  <body>
    <p
      style="
        margin: 20px;
        border: 10px;
        border-style: solid;
        border-color: blueviolet;
        padding: 60px;
        width: 400px;
      "
    >
      Este es mi texto
    </p>
    <!-- style="color: blueviolet; background-color: black; font-family: 'Times New Roman', Times, serif; font-size: 3em;" -->
    <!-- el style se puede agregar en la etiqueta HTML o en una hoja de estilos CSS externa y sirve para dar formato al texto. -->
    <!-- el font family sirve para definir la fuente del texto.-->
    <!-- el margin es el espacio exterior al borde del background. -->
    <!-- el border es el borde que rodea al texto. -->
    <!-- el padding es el espacio interior al borde del texto -->
    <!-- border style solid se usa para definir un borde sólido -->
  </body>
</html>
