     <script>
      //Math.pow(2,3) Se usa para elevar un numero en este caso 2 elevado  3-->
      function potencia(base,exponente){
        return Math.pow(base,exponente);
      }
      // Math.sqrt(2) sirve para conocer la raiz del numero adentro de los parentesis
      // Math.abs(-956) se usa para devolver el valor absoluto de un numero
      // Math.PI para traer el numero pi ya integrado
      function calcularCircunferencia(diametro){
        return Math.PI * diametro;
      }
      // Math.round(92302303.113131) sirve para redondear un numero al entero mas cercano
      // Math.floor(16.9) lo que hace es redondear hacia abajo no importa que tan alto se el numero
      // Math.ceil(84.001) hace lo contrario no importa que tan bajo el numero redondea hacia arriba
     </script>
