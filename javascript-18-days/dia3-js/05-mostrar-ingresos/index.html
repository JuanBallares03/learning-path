<html lang="en">
  <head>
    <title>Mostrar ingreso del usuario</title>
  </head>
  <body>

    <p>Ingresa tu nombre</p>
    <input type="text" id="nombreUsuario">
    <button onclick="mostrarNombre()">Ingresar</button>
    <h1 id="salida">Como te llamas?</h1>



    <script>
        function mostrarNombre(){
            let ingresoUsuario = document.getElementById("nombreUsuario");
            let elementoTexto = document.getElementById("salida");
            // elementoTexto.textContent = "Tu te llamas " + ingresoUsuario.value;
            let mensaje = "Tu te llamas " + ingresoUsuario.value;
            elementoTexto.textContent = mensaje;
        }
    </script>
  </body>
</html>
