<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="icon" href="favicon.ico"> -->
    <title>Loop for</title>
  </head>
  <body>
    <p></p>

    <script>
      //1. valor inicial; 2. condición; 3. incremento/decremento(Condicion de actualización)
      function testLoop() {
        for (let x = 0; x < 5; x += 1) {
          document.write("<p>" + "Vuelta: " + x + "</p>");
        }
      }
    </script>
  </body>
</html>
