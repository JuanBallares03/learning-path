<!DOCTYPE html>
<html>
  <head>
    <title>Mis etiquetas</title>
    <!-- Una etiqueta es un elemento HTML que se utiliza para definir el contenido de una página web -->
  </head>

  <body>
    Esta <em>palabra</em> tiene enfasis <br />
    <!-- em es para colocarme enfasis o entonacíon a una frase -->
    Esta <i>palabra</i> en cursiva <br />
    <!-- la i coloca el texto en formato cursiva -->
    Esta <strong>palabra</strong> es muy fuerte <br />
    <!-- el strong se usa para darle relevancia a algo o enfasis especial -->
    Esta <b>palabra</b> contiene negrilla <br />
    <!-- se usa para cambiarle el tono a negrilla -->
    Esta smart <small>palabra</small> es pequeña <br />
    <!-- cambia el tamaño del texto -->
    Esta <del>palabra</del> esta tachada <br />
    <!-- tacha el texto con esta etiqueta -->
    Esta <ins>palabra</ins> esta insertada <br />
    <!-- le coloca una especie de guion bajo sobre el texo -->
    Esta <u>palabra</u> esta subrayada <br />
    <!-- subraya el texto con la etiqueta u -->
    Esta <mark>palabra</mark> esta marcada <br />
    <!-- marca la palabra con amarillo -->
  </body>
</html>
