    <html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Callbacks</title>
    </head>
    <body>
        <script>

        const avanzaFila=(Callback)=>{
            setTimeout(function(){
                console.log("Tu turno ha llegado");
                Callback();
            },5000);
        }

        const mujerTeLlama=()=>{
            console.log("Te presentas a tu turno");
        }

        console.log("Llegas a la fina");
        avanzaFila(mujerTeLlama);

        console.log("Te vas comprar cafe");
        
        </script>
    </body>
    </html>
