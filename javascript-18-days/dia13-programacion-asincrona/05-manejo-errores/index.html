      "Async y await"

      const sumarNumero = async(a,b)=>{
        if(typeof a != "number" || typeof b != "number"){
            throw new Error("Alguno de los argumentos no es numero");
        }
        return a+b
      }

        const manejarErrores=async()=>{
            try{
                let resultado = await sumarNumero(2,3);
                console.log(resultado);
            }catch(error){
                console.error(error.message);
            }
        }

      manejarErrores();
