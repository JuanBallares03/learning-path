      "Ejemplo con diferentes peticiones a varias apis y esperar a que se complete todas las promesas";
      
      const obtenerTodo = async()=>{
        console.log("Este codigo esta al comienzo");
        let respuestaPrueba = await fetch("https://jsonplaceholder.typicode.com/posts");
        let datosPrueba = await respuestaPrueba.json();

        console.log("Este codigo esta al medio")
        let respuestaPokemon = await fetch("https://pokeapi.co/api/v2/pokemon/ditto");
        let datosPokemon = await respuestaPokemon.json();

        console.log(datosPrueba,datosPokemon);
        console.log("Este codigo esta al final");
      }

      obtenerTodo();
