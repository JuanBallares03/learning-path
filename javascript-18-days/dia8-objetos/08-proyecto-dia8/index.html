<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de empleados</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <h1 class="colorh1">Registro de Empleados</h1>

    <label for="infoLegajo">Legajo</label><br><br>
    <input type="text" id="infoLegajo"><br><br>

    <label for="infoNombre">Nombre</label><br><br>
    <input type="text" id="infoNombre"><br><br>
    
    <label for="infoApellido">Apellido</label><br><br>
    <input type="text" id="infoApellido"><br><br>

    <label for="infoFechaNacimiento">Fecha de nacimiento</label><br><br>
    <input type="number" min="0" id="infoFechaNacimiento"><br><br>

    <label for="infoCargo">Cargo</label><br><br>
    <input type="text" id="infoCargo"><br><br>

    <button onclick="nuevoEmpleado()">Cargar Empleado</button><br>
    <button onclick="mostrarEmpleados()">Mostrar Empleados</button>




  </body>
</html>
